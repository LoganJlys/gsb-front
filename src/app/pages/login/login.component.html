<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="bg-blue-600 text-white font-bold text-2xl px-6 py-2 rounded-xl tracking-wide">
        GSB
      </div>
    </div>

    <!-- Titre -->
    <h2 class="text-center text-gray-700 font-semibold text-lg mb-1">
      Connexion à votre espace
    </h2>
    <p class="text-center text-gray-400 text-sm mb-6">
      Galaxy Swiss Bourdin
    </p>

    <!-- Message erreur -->
    <div *ngIf="erreur"
      class="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-lg mb-4 flex items-center gap-2">
      <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12A9 9 0 1 1 3 12a9 9 0 0 1 18 0z"/>
      </svg>
      {{ erreur }}
    </div>

    <!-- Formulaire -->
    <div class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Login</label>
        <input
          [(ngModel)]="login"
          type="text"
          placeholder="jean.dupont"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Mot de passe</label>
        <input
          [(ngModel)]="mdp"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"/>
      </div>

      <button
        (click)="onSubmit()"
        [disabled]="loading"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-medium py-2 rounded-lg transition text-sm flex items-center justify-center gap-2">
        <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

    </div>

  </div>
</div>
